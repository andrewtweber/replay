name: Backend

on:
  push:

jobs:
  build_backend:
    name: Build (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      # Share each built environment with the matching test job (and, for the
      # 8.4 build, the inspect job) so it is only built once.
      - name: Upload vendor
        uses: actions/upload-artifact@v4
        with:
          name: vendor-${{ matrix.php }}
          path: vendor
          include-hidden-files: true
          retention-days: 1

  inspect_backend:
    name: Inspect (PHPStan)
    needs: build_backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite
          coverage: none

      - name: Download vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor-8.4
          path: vendor

      - name: Run PHPStan
        run: php vendor/bin/phpstan analyse --no-progress

  test_backend:
    name: Test (PHP ${{ matrix.php }})
    needs: build_backend
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite
          coverage: none

      - name: Download vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor-${{ matrix.php }}
          path: vendor

      - name: Run tests
        run: php vendor/bin/phpunit
